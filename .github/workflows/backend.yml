name: Backend CI

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "apps/backend/**"

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/backend

jobs:
  lint-and-type-check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

  import-linter:
    name: Module boundary check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check import boundaries
        run: uv run lint-imports

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest -m "not integration" --cov=app --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://unused/unused
          REDIS_URL: redis://unused:6379/0
          MASTER_KEY: test-key-not-real

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/backend/coverage.xml

  integration-tests:
    name: Integration tests (testcontainers)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run integration tests
        run: uv run pytest -m integration -v || [ $? -eq 5 ]
        env:
          # Placeholder URLs satisfy import-time get_settings(); testcontainers
          # fixtures override the engine with the real container URL at runtime.
          DATABASE_URL: postgresql+asyncpg://unused/unused
          REDIS_URL: redis://unused:6379/0
          MASTER_KEY: test-key-not-real

  migration-test:
    name: Migration test (forward / downgrade / re-upgrade)
    runs-on: self-hosted
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: wdiag_test
          POSTGRES_DB: wdiag_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432
    env:
      DATABASE_URL: postgresql+asyncpg://wdiag_test:testpassword@localhost:15432/wdiag_test
      MASTER_KEY: test-key-not-real
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Downgrade to base
        run: uv run alembic downgrade base

      - name: Re-apply migrations
        run: uv run alembic upgrade head
