// ─── Helpers ───────────────────────────────────────────────────────────────
function fmt(n, privacyMode = 'off', currency = 'USD') {
  if (privacyMode === 'full_blur') return '••••';
  const abs = Math.abs(n);
  const str = new Intl.NumberFormat('en-US', { style: 'currency', currency, maximumFractionDigits: 2 }).format(abs);
  if (privacyMode === 'partial_blur') return str.replace(/\d/g, '•');
  return (n < 0 ? '-' : '') + str;
}
function pct(a, b) { return Math.min(100, Math.round((a / b) * 100)); }

// ─── SVG Sparkline ─────────────────────────────────────────────────────────
function Sparkline({ data, width = 120, height = 40, color, fill = false }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  });
  const path = `M ${pts.join(' L ')}`;
  const fillPath = `${path} L ${width},${height} L 0,${height} Z`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}>
      {fill && <path d={fillPath} fill={color} fillOpacity={0.12} stroke="none" />}
      <path d={path} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ─── Mini Bar Chart ────────────────────────────────────────────────────────
function MiniBarChart({ data, t, width = 180, height = 60 }) {
  const max = Math.max(...data.flatMap(d => [d.income, d.expense]));
  const bw = (width / data.length) * 0.35;
  const gap = (width / data.length) * 0.15;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {data.map((d, i) => {
        const x = (i / data.length) * width + gap;
        const ih = (d.income / max) * (height - 10);
        const eh = (d.expense / max) * (height - 10);
        return (
          <g key={i}>
            <rect x={x} y={height - ih} width={bw} height={ih} rx={2} fill={t.success} fillOpacity={0.7} />
            <rect x={x + bw + 2} y={height - eh} width={bw} height={eh} rx={2} fill={t.danger} fillOpacity={0.6} />
          </g>
        );
      })}
    </svg>
  );
}

// ─── Donut Chart ───────────────────────────────────────────────────────────
function DonutChart({ segments, size = 80, thickness = 14 }) {
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * r;
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  let offset = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="currentColor" strokeOpacity={0.06} strokeWidth={thickness} />
      {segments.map((seg, i) => {
        const dash = (seg.value / total) * circumference;
        const el = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={seg.color} strokeWidth={thickness}
            strokeDasharray={`${dash} ${circumference - dash}`}
            strokeDashoffset={-offset}
            strokeLinecap="round"
          />
        );
        offset += dash;
        return el;
      })}
    </svg>
  );
}

function StatCard({ t, label, value, delta, deltaLabel, children, accent, mono = true }) {
  const positive = delta > 0;
  return (

      background: t.bgElevated,
      border: `1px solid ${t.border}`,
      borderRadius: 12,
      padding: '18px 20px',

        <div style={{ fontSize: 12, color: positive ? t.success : t.danger, display: 'flex', alignItems: 'center', gap: 4 }}>

          {deltaLabel && <span style={{ color: t.fgMuted }}>{deltaLabel}</span>}
        </div>
      )}
      {children}
    </div>
  );
}

// ─── Progress Bar ──────────────────────────────────────────────────────────
function Bar({ value, max, color, t, thin = false }) {
  const p = pct(value, max);
  const overBudget = value > max;
  return (
    <div style={{ position: 'relative', height: thin ? 4 : 6, borderRadius: 99, background: t.border, overflow: 'hidden' }}>
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0,
        width: `${Math.min(100, p)}%`,
        background: overBudget ? t.danger : color,
        borderRadius: 99,
        transition: 'width 0.4s ease',
      }} />
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
function DashboardA({ t, privacy }) {
  const cats = catColors(t);
  const sparkData = [28000, 30200, 31500, 29800, 33000, 35200, 38100, 41000, 43200, 45800, 46200, 47832];
  return (
    <div style={{ display: 'flex', height: '100%', background: t.bgPrimary, fontFamily: "'Geist', sans-serif" }}>
      <Sidebar t={t} active="dashboard" />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Top bar */}
        <div style={{ padding: '14px 24px', borderBottom: `1px solid ${t.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 600, color: t.fgPrimary }}>Good morning, Justin</div>
            <div style={{ fontSize: 12, color: t.fgMuted }}>May 4, 2026 · Home household</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <HitlBadge t={t} count={3} />
            <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px', borderRadius: 8, background: t.accent, color: t.accentFg, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>
              {icons.plus} Add transaction
            </button>
          </div>
        </div>

        {/* Main scroll area */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 16 }}>

          {/* Hero row */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 12 }}>
            <div style={{ gridColumn: '1 / 3', background: t.bgElevated, border: `1px solid ${t.border}`, borderRadius: 12, padding: '20px 24px', display: 'flex', gap: 24, alignItems: 'flex-start' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: t.fgMuted, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Net Worth</div>
                <div style={{ fontSize: 34, fontWeight: 700, fontFamily: "'Geist Mono', monospace", color: t.fgPrimary, letterSpacing: '-0.03em', marginBottom: 4 }}>{fmt(SAMPLE.netWorth, privacy)}</div>
                <div style={{ fontSize: 12, color: t.success, display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span>↑</span><span style={{ fontFamily: "'Geist Mono', monospace" }}>{fmt(SAMPLE.netWorthDelta)}</span><span style={{ color: t.fgMuted }}>this month</span>
                </div>
              </div>
              <Sparkline data={sparkData} width={140} height={50} color={t.accent} fill />
            </div>
            <StatCard t={t} label="Spent this month" value={fmt(SAMPLE.monthlySpent, privacy)} delta={-SAMPLE.monthlySpent + 3800} deltaLabel="vs last month">
              <Bar value={SAMPLE.monthlySpent} max={SAMPLE.monthlyBudget} color={t.accent} t={t} thin />
              <div style={{ fontSize: 11, color: t.fgMuted }}>{pct(SAMPLE.monthlySpent, SAMPLE.monthlyBudget)}% of {fmt(SAMPLE.monthlyBudget)} budget</div>
            </StatCard>
            <StatCard t={t} label="Saved this month" value={fmt(SAMPLE.savings, privacy)} delta={SAMPLE.savings - 2800} deltaLabel="vs last month" accent={t.success} />
          </div>

          {/* Three-col grid */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.2fr 0.9fr', gap: 12 }}>

            {/* Transactions */}
            <div style={{ background: t.bgElevated, border: `1px solid ${t.border}`, borderRadius: 12, padding: '16px 18px', display: 'flex', flexDirection: 'column', gap: 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: t.fgPrimary }}>Recent Transactions</div>
                <span style={{ fontSize: 12, color: t.accent, cursor: 'pointer' }}>View all</span>
              </div>
              {SAMPLE.recentTx.slice(0, 5).map((tx, i) => <TxRow key={i} tx={tx} t={t} privacy={privacy} />)}
            </div>

            {/* Budget */}
            <div style={{ background: t.bgElevated, border: `1px solid ${t.border}`, borderRadius: 12, padding: '16px 18px', display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: t.fgPrimary }}>Budget — May</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <DonutChart size={36} thickness={8} segments={[
                    { value: SAMPLE.monthlySpent, color: t.accent },
                    { value: SAMPLE.monthlyBudget - SAMPLE.monthlySpent, color: t.border },
                  ]} />
                  <div style={{ fontSize: 11, color: t.fgMuted }}>{pct(SAMPLE.monthlySpent, SAMPLE.monthlyBudget)}%</div>
                </div>
              </div>
              {SAMPLE.budgetLines.map((line, i) => (
                <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <div style={{ width: 6, height: 6, borderRadius: '50%', background: cats[line.color], flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: t.fgSecondary }}>{line.name}</span>
                    </div>
                    <span style={{ fontSize: 12, fontFamily: "'Geist Mono', monospace", color: t.fgMuted }}>
                      {fmt(line.spent, privacy)} <span style={{ color: t.fgMuted, fontWeight: 400 }}>/ {fmt(line.planned, privacy)}</span>
                    </span>
                  </div>
                  <Bar value={line.spent} max={line.planned} color={cats[line.color]} t={t} />
                </div>
              ))}
            </div>

            {/* Goals + Accounts */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div style={{ background: t.bgElevated, border: `1px solid ${t.border}`, borderRadius: 12, padding: '16px 18px', flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: t.fgPrimary, marginBottom: 12 }}>Goals</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {SAMPLE.goals.map((g, i) => (
                    <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
                        <span style={{ color: t.fgSecondary }}>{g.name}</span>
                        <span style={{ fontFamily: "'Geist Mono', monospace", color: t.fgMuted }}>{pct(g.current, g.target)}%</span>
                      </div>
                      <Bar value={g.current} max={g.target} color={cats[g.color]} t={t} />
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: t.bgElevated, border: `1px solid ${t.border}`, borderRadius: 12, padding: '16px 18px' }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: t.fgPrimary, marginBottom: 10 }}>Accounts</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {SAMPLE.accounts.map((a, i) => (
                    <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 500, color: t.fgPrimary }}>{a.name}</div>
                        <div style={{ fontSize: 11, color: t.fgMuted }}>{a.institution}</div>
                      </div>
                      <div style={{ fontSize: 12, fontFamily: "'Geist Mono', monospace", color: a.balance < 0 ? t.danger : t.fgPrimary, fontWeight: 500 }}>
                        {fmt(a.balance, privacy)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* Cash flow chart */}
          <div style={{ background: t.bgElevated, border: `1px solid ${t.border}`, borderRadius: 12, padding: '16px 20px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: t.fgPrimary }}>Cash Flow — 6 months</div>
              <div style={{ display: 'flex', gap: 16, fontSize: 11, color: t.fgMuted }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: t.success, display: 'inline-block' }} /> Income</span>
                <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: t.danger, display: 'inline-block' }} /> Expenses</span>
              </div>
            </div>
            <MiniBarChart data={SAMPLE.cashflow} t={t} width={600} height={70} />
          </div>
        </div>
      </div>
    </div>
  );
}

// VARIATION B — "Focused Flow"
// Accounts in sidebar, full-height tx feed on right, goals below budget on left
// ══════════════════════════════════════════════════════════════════════════════
// Account color dots for collapsed sidebar
const ACCOUNT_DOTS = ['oklch(60% 0.2 250)', 'oklch(58% 0.2 140)', 'oklch(60% 0.22 30)', 'oklch(58% 0.2 320)'];

function SidebarB({ t, privacy, privacyMode, setPrivacyMode, activeNav, setActiveNav }) {
  const [expanded, setExpanded] = React.useState(true);
  const navItems = [
    { id: 'dashboard', label: 'Overview',     icon: icons.dashboard },
    { id: 'txn',       label: 'Transactions', icon: icons.txn },
    { id: 'budget',    label: 'Budget',       icon: icons.budget },
    { id: 'goals',     label: 'Goals',        icon: icons.goals },
    { id: 'debt',      label: 'Debts',        icon: icons.debt },
    { id: 'calendar',  label: 'Calendar',     icon: icons.calendar },
  ];

  const w = expanded ? 220 : 52;
  const privacyIcons = { off: icons.eye, partial_blur: icons.eyeOff, full_blur: icons.eyeOff };
  const nextPrivacy = { off: 'partial_blur', partial_blur: 'full_blur', full_blur: 'off' };
  const privacyLabel = { off: 'Visible', partial_blur: 'Blurred', full_blur: 'Hidden' };

  return (
    <div style={{
      width: w, minWidth: w, height: '100%',
      background: t.bgSidebar,
      borderRight: `1px solid ${t.border}`,
      display: 'flex', flexDirection: 'column',
      padding: expanded ? '16px 12px' : '16px 8px',
      gap: 2, flexShrink: 0,
      transition: 'width 0.2s cubic-bezier(0.4,0,0.2,1), min-width 0.2s cubic-bezier(0.4,0,0.2,1), padding 0.2s',
      overflow: 'hidden',
    }}>
      {/* Wordmark / collapse toggle */}
      <div
        onClick={() => setExpanded(e => !e)}
        style={{ padding: expanded ? '6px 8px 18px' : '6px 4px 18px', display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', userSelect: 'none' }}
      >
        <div style={{ width: 28, height: 28, borderRadius: 8, flexShrink: 0, background: t.accent, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ color: t.accentFg, fontFamily: "'Geist Mono', monospace", fontSize: 13, fontWeight: 600 }}>$</span>
        </div>
        {expanded && (
          <span style={{ fontFamily: "'Geist Mono', monospace", fontSize: 12, fontWeight: 500, color: t.fgPrimary, letterSpacing: '0.02em', lineHeight: 1.3, whiteSpace: 'nowrap' }}>
            where did<br />it all go
          </span>
        )}
      </div>

      {/* Nav */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
        {navItems.map(item => {
          const isActive = item.id === (activeNav || 'dashboard');
          return (
            <div key={item.id}
              onClick={() => setActiveNav && setActiveNav(item.id)}
              title={!expanded ? item.label : undefined}
              style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: expanded ? '8px 10px' : '8px',
                justifyContent: expanded ? 'flex-start' : 'center',
                borderRadius: 6,
                background: isActive ? `${t.accent}18` : 'transparent',
                color: isActive ? t.accent : t.fgSecondary,
                cursor: 'pointer', fontSize: 13, fontWeight: isActive ? 500 : 400,
                transition: 'background 0.1s',
                whiteSpace: 'nowrap',
              }}
            >
              {item.icon}
              {expanded && <span>{item.label}</span>}
            </div>
          );
        })}
      </div>

      {/* Accounts section */}
      <div style={{ marginTop: 20, flex: 1, minHeight: 0, overflow: 'hidden' }}>
        {expanded && (
          <div style={{ fontSize: 10, fontWeight: 600, color: t.fgMuted, textTransform: 'uppercase', letterSpacing: '0.08em', padding: '0 10px', marginBottom: 6 }}>Accounts</div>
        )}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
          {SAMPLE.accounts.map((a, i) => (
            <div key={i} title={!expanded ? `${a.name}: ${fmt(a.balance, privacy)}` : undefined} style={{
              display: 'flex', justifyContent: expanded ? 'space-between' : 'center', alignItems: 'center',
              padding: expanded ? '7px 10px' : '7px',
              borderRadius: 6, cursor: 'pointer',
            }}>
              {expanded ? (
                <>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 12, color: t.fgSecondary, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{a.name}</div>
                    <div style={{ fontSize: 10, color: t.fgMuted }}>{a.institution}</div>
                  </div>
                  <div style={{ fontSize: 12, fontFamily: "'Geist Mono', monospace", color: a.balance < 0 ? t.danger : t.fgSecondary, flexShrink: 0, marginLeft: 6 }}>
                    {fmt(a.balance, privacy)}
                  </div>
                </>
              ) : (
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: ACCOUNT_DOTS[i] || t.fgMuted }} />
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Privacy toggle + user */}
      <div style={{ borderTop: `1px solid ${t.border}`, paddingTop: 8, display: 'flex', flexDirection: 'column', gap: 4 }}>
        {/* Privacy toggle */}
        <div
          onClick={() => setPrivacyMode && setPrivacyMode(nextPrivacy[privacyMode || 'off'])}
          title="Toggle privacy mode"
          style={{
            display: 'flex', alignItems: 'center', gap: 10,
            padding: expanded ? '7px 10px' : '7px',
            justifyContent: expanded ? 'flex-start' : 'center',
            borderRadius: 6, cursor: 'pointer',
            color: privacyMode !== 'off' ? t.warning : t.fgMuted,
            background: privacyMode !== 'off' ? `${t.warning}12` : 'transparent',
            transition: 'all 0.15s',
          }}
        >
          {privacyIcons[privacyMode || 'off']}
          {expanded && <span style={{ fontSize: 12, whiteSpace: 'nowrap' }}>{privacyLabel[privacyMode || 'off']}</span>}
        </div>

        {/* User */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: expanded ? '6px 10px 2px' : '6px 4px 2px', justifyContent: expanded ? 'flex-start' : 'center' }}>
          <div style={{ width: 28, height: 28, borderRadius: '50%', background: t.accent, opacity: 0.8, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <span style={{ color: 'white', fontSize: 12, fontWeight: 600 }}>JC</span>
          </div>
          {expanded && (
            <div>
              <div style={{ fontSize: 12, fontWeight: 500, color: t.fgPrimary }}>Justin</div>
              <div style={{ fontSize: 11, color: t.fgMuted }}>Home lab</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DashboardB({ t, privacy: privacyProp }) {
  const cats = catColors(t);
  const [selectedTx, setSelectedTx] = React.useState(null);
  const [activeNav, setActiveNav] = React.useState('dashboard');
  const [privacyMode, setPrivacyMode] = React.useState(privacyProp || 'off');
  const [calOpen, setCalOpen] = React.useState(false);
  const privacy = privacyMode;

  // Sync privacy from tweaks prop
  React.useEffect(() => { setPrivacyMode(privacyProp); }, [privacyProp]);

  const spentPct = pct(SAMPLE.monthlySpent, SAMPLE.monthlyBudget);
  const donutSegs = SAMPLE.budgetLines.map((l) => ({ value: l.spent, color: cats[l.color] }));

  // Open calendar when nav item clicked
  React.useEffect(() => {
    if (activeNav === 'calendar') { setCalOpen(true); setActiveNav('dashboard'); }
  }, [activeNav]);

  const allTx = [
    ...SAMPLE.recentTx,
    { merchant: "Trader Joe's", amount: -62.14, cat: 'Groceries', catColor: 0, date: 'Apr 29', posted: true },
    { merchant: 'Lyft', amount: -18.50, cat: 'Transport', catColor: 5, date: 'Apr 28', posted: true },
    { merchant: 'Apple One', amount: -32.95, cat: 'Subscriptions', catColor: 4, date: 'Apr 28', posted: true },
    { merchant: 'REI', amount: -124.00, cat: 'Shopping', catColor: 2, date: 'Apr 27', posted: true },
  ];

  return (
    <div style={{ display: 'flex', height: '100%', background: t.bgPrimary, fontFamily: "'Geist', sans-serif", position: 'relative', overflow: 'hidden' }}>
      {selectedTx && <TxModal tx={selectedTx} t={t} privacy={privacy} onClose={() => setSelectedTx(null)} />}

      <SidebarB t={t} privacy={privacy} privacyMode={privacyMode} setPrivacyMode={setPrivacyMode} activeNav={activeNav} setActiveNav={setActiveNav} />

      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>
        {/* Left panel: budget focus + goals */}
        <div style={{ width: 300, borderRight: `1px solid ${t.border}`, display: 'flex', flexDirection: 'column', overflowY: 'auto', flexShrink: 0 }}>
          <div style={{ padding: '18px 20px 14px', borderBottom: `1px solid ${t.border}`, flexShrink: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: t.fgPrimary }}>May 2026</div>
            <div style={{ fontSize: 12, color: t.fgMuted }}>4 days elapsed · 27 remaining</div>
          </div>

          <div style={{ padding: '18px 20px', display: 'flex', flexDirection: 'column', gap: 18 }}>
            {/* Net worth */}
            <div style={{ padding: '12px 14px', background: t.bgSecondary, borderRadius: 10, border: `1px solid ${t.border}` }}>
              <div style={{ fontSize: 10, color: t.fgMuted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Net Worth</div>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Geist Mono', monospace", color: t.fgPrimary, letterSpacing: '-0.02em' }}>{fmt(SAMPLE.netWorth, privacy)}</div>
              <div style={{ fontSize: 11, color: t.success, marginTop: 3 }}>↑ {fmt(SAMPLE.netWorthDelta)} this month</div>
            </div>

            {/* Donut */}
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, padding: '8px 0' }}>
              <div style={{ position: 'relative', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
                <DonutChart segments={donutSegs} size={140} thickness={17} />
                <div style={{ position: 'absolute', textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "'Geist Mono', monospace", color: t.fgPrimary, letterSpacing: '-0.03em' }}>{spentPct}%</div>
                  <div style={{ fontSize: 10, color: t.fgMuted }}>of budget</div>
                </div>
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 17, fontWeight: 600, fontFamily: "'Geist Mono', monospace", color: t.fgPrimary }}>{fmt(SAMPLE.monthlySpent, privacy)}</div>
                <div style={{ fontSize: 11, color: t.fgMuted }}>of {fmt(SAMPLE.monthlyBudget, privacy)} budget</div>
              </div>
            </div>

            {/* Budget lines */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
              {SAMPLE.budgetLines.map((line, i) => (
                <div key={i}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                      <div style={{ width: 7, height: 7, borderRadius: 2, background: cats[line.color], flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: t.fgSecondary }}>{line.name}</span>
                    </div>
                    <span style={{ fontSize: 11, fontFamily: "'Geist Mono', monospace", color: t.fgMuted }}>
                      {fmt(line.spent, privacy)} / {fmt(line.planned, privacy)}
                    </span>
                  </div>
                  <Bar value={line.spent} max={line.planned} color={cats[line.color]} t={t} />
                </div>
              ))}
            </div>

            <div style={{ borderTop: `1px solid ${t.border}` }} />

            {/* Goals */}
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: t.fgPrimary, marginBottom: 10 }}>Goals</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
                {SAMPLE.goals.map((g, i) => (
                  <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                      <span style={{ fontSize: 12, color: t.fgSecondary }}>{g.name}</span>
                      <span style={{ fontSize: 11, fontFamily: "'Geist Mono', monospace", color: cats[g.color] }}>
                        {fmt(g.current, privacy)} / {fmt(g.target, privacy)}
                      </span>
                    </div>
                    <Bar value={g.current} max={g.target} color={cats[g.color]} t={t} />
                    <div style={{ fontSize: 10, color: t.fgMuted }}>{pct(g.current, g.target)}% · on track</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Right: transactions */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <div style={{ padding: '16px 24px', borderBottom: `1px solid ${t.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 600, color: t.fgPrimary }}>Transactions</div>
              <div style={{ fontSize: 11, color: t.fgMuted }}>May 2026</div>
            </div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <HitlBadge t={t} count={3} />
              {/* Calendar toggle */}
              <button
                onClick={() => setCalOpen(o => !o)}
                style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 12px', borderRadius: 8, background: calOpen ? `${t.accent}20` : t.bgSecondary, color: calOpen ? t.accent : t.fgSecondary, border: `1px solid ${calOpen ? t.accent : t.border}`, cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>
                {icons.calendar}
              </button>
              <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px', borderRadius: 8, background: t.accent, color: t.accentFg, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 500 }}>
                {icons.plus} Add
              </button>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '0 24px' }}>
            {[
              { label: 'Today — May 4', txs: allTx.filter(tx => tx.date === 'Today') },
              { label: 'May 1', txs: allTx.filter(tx => tx.date === 'May 1') },
              { label: 'April 30', txs: allTx.filter(tx => tx.date === 'Apr 30') },
              { label: 'April 29', txs: allTx.filter(tx => tx.date === 'Apr 29') },
              { label: 'April 28', txs: allTx.filter(tx => tx.date === 'Apr 28') },
              { label: 'April 27', txs: allTx.filter(tx => tx.date === 'Apr 27') },
            ].filter(g => g.txs.length > 0).map((group, gi) => (
              <div key={gi}>
                <div style={{ fontSize: 11, fontWeight: 600, color: t.fgMuted, textTransform: 'uppercase', letterSpacing: '0.07em', padding: '16px 0 4px', position: 'sticky', top: 0, background: t.bgPrimary }}>

              <span style={{ fontSize: 10, fontWeight: isActive ? 500 : 400 }}>{tab.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// CALENDAR SLIDEOUT — compact panel sliding in from right of dashboard
// Full event interactivity: paid / pending / late states, mark-as-paid
// ══════════════════════════════════════════════════════════════════════════════

const RECURRING_EVENTS = [
  { id: 'r1', d: 1,  label: 'Paycheck',       amount: 4200,   type: 'income',  status: 'paid',    account: 'Chase Checking', icon: '⬆' },
  { id: 'r2', d: 8,  label: 'Netflix',         amount: -22.99, type: 'bill',    status: 'upcoming', account: 'Visa Signature', icon: '↻' },
  { id: 'r3', d: 15, label: 'Paycheck',        amount: 4200,   type: 'income',  status: 'upcoming', account: 'Chase Checking', icon: '⬆' },
  { id: 'r4', d: 21, label: 'Rent',            amount: -1850,  type: 'bill',    status: 'upcoming', account: 'Chase Checking', icon: '↻' },
  { id: 'r5', d: 26, label: 'Spotify',         amount: -11.99, type: 'bill',    status: 'upcoming', account: 'Visa Signature', icon: '↻' },
  { id: 'r6', d: 29, label: 'Auto Loan',       amount: -412,   type: 'bill',    status: 'upcoming', account: 'Chase Checking', icon: '↻' },
  // Late event from April
  { id: 'r7', d: 28, label: 'Gym Membership',  amount: -45,    type: 'bill',    status: 'late',     account: 'Visa Signature', icon: '↻', daysLate: 6 },
];

function CalendarSlideout({ t, privacy, onClose }) {
  const [selectedDay, setSelectedDay] = React.useState(4);
  const [paidEvents, setPaidEvents] = React.useState({ r1: true }); // r1 already paid
  const cats = catColors(t);
  const DOW = ['S','M','T','W','T','F','S'];

  const runningBalance = (() => {
    let bal = 6420;
    const out = [bal];
    for (let d = 1; d <= 31; d++) {
      const evs = RECURRING_EVENTS.filter(e => e.d === d);
      evs.forEach(e => { bal += e.amount; });
      out.push(Math.max(0, bal));
    }
    return out;
  })();

  const maxBal = Math.max(...runningBalance);
  const minBal = Math.min(...runningBalance);
  const range = maxBal - minBal || 1;
  const W = 500, H = 56;
  const pts = runningBalance.map((b, i) => {
    const x = (i / (runningBalance.length - 1)) * W;
    const y = H - ((b - minBal) / range) * (H - 8) - 4;
    return `${x},${y}`;
  });
  const terrainPath = `M ${pts.join(' L ')}`;
  const fillPath = `${terrainPath} L ${W},${H} L 0,${H} Z`;
  const todayX = (4 / (runningBalance.length - 1)) * W;

  // events on selected day
  const dayEvents = RECURRING_EVENTS.filter(e => e.d === selectedDay);
  const dayTxs = SAMPLE.recentTx.filter(tx =>
    (selectedDay === 4 && tx.date === 'Today') ||
    (selectedDay === 1 && tx.date === 'May 1')
  );

  const statusStyle = (ev) => {
    const isPaid = paidEvents[ev.id];
    if (isPaid || ev.status === 'paid') return { dotBg: t.success, border: `${t.success}30`, bg: `${t.success}08`, label: 'Paid', labelColor: t.success };
    if (ev.status === 'late') return { dotBg: t.danger, border: `${t.danger}40`, bg: `${t.danger}10`, label: `${ev.daysLate}d late`, labelColor: t.danger };
    return { dotBg: t.fgMuted, border: t.border, bg: t.bgSecondary, label: 'Expected', labelColor: t.fgMuted };
  };

  // Build flat day list for grid
  const dayGrid = [];
  for (let i = 0; i < 5; i++) dayGrid.push(null); // May 1 = Friday → pad 5
  for (let d = 1; d <= 31; d++) dayGrid.push(d);

  const weeks = [];
  for (let i = 0; i < dayGrid.length; i += 7) weeks.push(dayGrid.slice(i, i + 7));

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: t.bgPrimary }}>
      {/* Header */}
      <div style={{ padding: '16px 20px', borderBottom: `1px solid ${t.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600, color: t.fgPrimary }}>Calendar</div>
          <div style={{ fontSize: 11, color: t.fgMuted, fontFamily: "'Geist Mono', monospace" }}>May 2026</div>
        </div>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: t.fgMuted, cursor: 'pointer', fontSize: 18, padding: 4, lineHeight: 1 }}>✕</button>
      </div>

      {/* Terrain */}
      <div style={{ padding: '12px 16px 0', flexShrink: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
          <span style={{ fontSize: 10, color: t.fgMuted, textTransform: 'uppercase', letterSpacing: '0.07em' }}>Checking balance</span>
          <span style={{ fontSize: 11, fontFamily: "'Geist Mono', monospace", color: t.fgSecondary }}>{fmt(runningBalance[selectedDay], privacy)}<span style={{ color: t.fgMuted, fontWeight: 400 }}> on May {selectedDay}</span></span>
        </div>
        <div style={{ position: 'relative', background: t.bgSecondary, borderRadius: 8, border: `1px solid ${t.border}`, padding: '8px 12px 4px', overflow: 'hidden' }}>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
            <defs>
              <linearGradient id="slGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={t.accent} stopOpacity="0.2" />
                <stop offset="100%" stopColor={t.accent} stopOpacity="0.01" />
              </linearGradient>
            </defs>
            <path d={fillPath} fill="url(#slGrad)" />
            {/* Past portion — solid */}
            <path d={`M ${pts.slice(0, 5).join(' L ')}`} fill="none" stroke={t.accent} strokeWidth={2} strokeLinecap="round" />
            {/* Future — dashed */}
            <path d={`M ${pts.slice(4).join(' L ')}`} fill="none" stroke={t.accent} strokeWidth={1.5} strokeDasharray="4,3" strokeLinecap="round" opacity={0.6} />
            {/* Today marker */}
            <line x1={todayX} y1={0} x2={todayX} y2={H} stroke={t.accent} strokeWidth={1} strokeDasharray="3,2" />
            {/* Selected day marker */}
            {selectedDay !== 4 && (
              <line x1={(selectedDay / (runningBalance.length - 1)) * W} y1={0} x2={(selectedDay / (runningBalance.length - 1)) * W} y2={H} stroke={t.fgMuted} strokeWidth={1} strokeDasharray="3,2" opacity={0.5} />
            )}
            {/* Event dots on terrain */}
            {RECURRING_EVENTS.map(ev => {
              const x = (ev.d / (runningBalance.length - 1)) * W;
              const y = H - ((runningBalance[ev.d] - minBal) / range) * (H - 8) - 4;
              const isPaid = paidEvents[ev.id] || ev.status === 'paid';
              const isLate = ev.status === 'late';
              return (
                <circle key={ev.id} cx={x} cy={y} r={3.5}
                  fill={isPaid ? t.success : isLate ? t.danger : ev.type === 'income' ? t.success : t.fgMuted}
                  fillOpacity={isPaid ? 1 : 0.7}
                  stroke={t.bgPrimary} strokeWidth={1}
                />
              );
            })}
          </svg>
        </div>
      </div>

      {/* Mini calendar grid */}
      <div style={{ padding: '12px 16px 8px', flexShrink: 0 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2, marginBottom: 4 }}>
          {DOW.map((d, i) => <div key={i} style={{ fontSize: 9, color: t.fgMuted, textAlign: 'center', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{d}</div>)}
        </div>
        {weeks.map((week, wi) => (
          <div key={wi} style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2, marginBottom: 2 }}>
            {week.map((day, di) => {
              if (!day) return <div key={di} />;
              const isToday = day === 4;
              const isSel = day === selectedDay;
              const hasEvents = RECURRING_EVENTS.some(e => e.d === day);
              const hasLate = RECURRING_EVENTS.some(e => e.d === day && e.status === 'late');
              const hasIncome = RECURRING_EVENTS.some(e => e.d === day && e.type === 'income');
              const isFuture = day > 4;
              return (
                <div key={di} onClick={() => setSelectedDay(day)} style={{
                  height: 32, borderRadius: 6, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
                  cursor: 'pointer',
                  background: isSel ? t.accent : isToday ? `${t.accent}14` : 'transparent',
                  border: isSel ? 'none' : isToday ? `1px solid ${t.accent}40` : `1px solid transparent`,
                  opacity: isFuture ? 0.75 : 1,
                }}>
                  <span style={{ fontSize: 11, fontWeight: isToday ? 700 : 400, color: isSel ? t.accentFg : isToday ? t.accent : t.fgPrimary, lineHeight: 1 }}>{day}</span>
                  {hasEvents && (
                    <div style={{ display: 'flex', gap: 2 }}>
                      {hasIncome && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.7)' : t.success }} />}
                      {hasLate && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.7)' : t.danger }} />}
                      {!hasIncome && !hasLate && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.5)' : t.fgMuted, opacity: 0.7 }} />}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div style={{ borderTop: `1px solid ${t.border}` }} />

      {/* Day detail */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: t.fgPrimary, marginBottom: 10 }}>
          May {selectedDay}{selectedDay === 4 ? ' — Today' : selectedDay > 4 ? ' — Upcoming' : ''}
        </div>

        {/* Recurring events */}
        {dayEvents.length > 0 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12 }}>
            {dayEvents.map(ev => {
              const st = statusStyle(ev);
              const isPaid = paidEvents[ev.id] || ev.status === 'paid';
              const isIncome = ev.type === 'income';
              return (
                <div key={ev.id} style={{ background: st.bg, border: `1px solid ${st.border}`, borderRadius: 10, padding: '11px 14px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: isPaid ? 0 : 8 }}>
                    {/* Status dot */}
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: st.dotBg, flexShrink: 0, boxShadow: ev.status === 'late' ? `0 0 0 3px ${t.danger}30` : 'none' }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: t.fgPrimary }}>{ev.label}</div>
                      <div style={{ fontSize: 10, color: t.fgMuted, marginTop: 1 }}>{ev.account} · <span style={{ color: st.labelColor, fontWeight: 500 }}>{st.label}</span></div>
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Geist Mono', monospace", color: isIncome ? t.success : t.fgPrimary }}>
                      {isIncome ? '+' : ''}{fmt(ev.amount, privacy)}
                    </div>
                  </div>
                  {/* Actions for unpaid */}
                  {!isPaid && (
                    <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                      {ev.status === 'late' && (
                        <div style={{ fontSize: 10, color: t.danger, background: `${t.danger}12`, padding: '3px 8px', borderRadius: 4, fontWeight: 500 }}>
                          ⚠ {ev.daysLate} days overdue
                        </div>
                      )}
                      <button
                        onClick={() => setPaidEvents(p => ({ ...p, [ev.id]: true }))}
                        style={{ marginLeft: 'auto', fontSize: 11, padding: '4px 10px', borderRadius: 6, border: `1px solid ${t.success}`, background: `${t.success}14`, color: t.success, cursor: 'pointer', fontWeight: 500, fontFamily: "'Geist', sans-serif" }}
                      >
                        ✓ Mark as paid
                      </button>
                      <button style={{ fontSize: 11, padding: '4px 10px', borderRadius: 6, border: `1px solid ${t.border}`, background: 'none', color: t.fgMuted, cursor: 'pointer', fontFamily: "'Geist', sans-serif" }}>
                        Skip
                      </button>
                    </div>
                  )}
                  {isPaid && (
                    <div style={{ fontSize: 10, color: t.success, marginTop: 4 }}>✓ Matched to transaction</div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Actual transactions */}
        {dayTxs.length > 0 && (
          <>
            <div style={{ fontSize: 10, fontWeight: 600, color: t.fgMuted, textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 6 }}>Transactions</div>
            {dayTxs.map((tx, i) => <TxRow key={i} tx={tx} t={t} privacy={privacy} />)}
          </>
        )}

        {dayEvents.length === 0 && dayTxs.length === 0 && (
          <div style={{ textAlign: 'center', padding: '28px 0', color: t.fgMuted, fontSize: 12 }}>
            {selectedDay > 4 ? 'No expected events' : 'No activity'}
          </div>
        )}

        {/* Balance callout */}
        <div style={{ marginTop: 14, padding: '10px 14px', background: t.bgSecondary, border: `1px solid ${t.border}`, borderRadius: 8 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 11, color: t.fgMuted }}>Checking balance{selectedDay > 4 ? ' (projected)' : ''}</span>
            <span style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Geist Mono', monospace", color: runningBalance[selectedDay] < 1000 ? t.warning : t.fgPrimary }}>
              {fmt(runningBalance[selectedDay], privacy)}
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

    { d: 22, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    { d: 23, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    // week 5
    { d: 24, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    { d: 25, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    { d: 26, spend: 0,    income: 0, events: ['spotify'], txCount: 0, future: true  },
    { d: 27, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    { d: 28, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    { d: 29, spend: 180,  income: 0, events: ['autoLoan'], txCount: 1, future: true  },
    { d: 30, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
    { d: 31, spend: 0,    income: 0, events: [], txCount: 0, future: true  },
  ];
  dayData.forEach(d => days.push(d));
  // chunk into weeks
  for (let i = 0; i < days.length; i += 7) weeks.push(days.slice(i, i + 7));
  return weeks;
})();

const ACCOUNT_SERIES = [
  {
    id: 'checking', label: 'Chase Checking', color: 'accent',
    start: 6420,
    events: [
      { d: 1, delta: +8400 }, { d: 4, delta: -117 }, { d: 15, delta: +8400 },

    ],
    invert: true, // show as positive debt growing
  },
];

function buildSeries(acct) {
  const vals = [acct.start];
  for (let d = 1; d <= 31; d++) {
    const evs = acct.events.filter(e => e.d === d);
    const delta = evs.reduce((s, e) => s + e.delta, 0);
    vals.push(vals[vals.length - 1] + delta);
  }
  return vals;
}

function TerrainChart({ t, privacy, width = 900, height = 160 }) {
  const [animated, setAnimated] = React.useState(false);
  const [visibleAccounts, setVisibleAccounts] = React.useState(['checking', 'savings']);
  const [hoveredDay, setHoveredDay] = React.useState(null);
  const svgRef = React.useRef(null);
  const BREACH_THRESHOLD = 2000;

  React.useEffect(() => {
    const timer = setTimeout(() => setAnimated(true), 100);
    return () => clearTimeout(timer);
  }, []);

  const series = ACCOUNT_SERIES.map(acct => ({
    ...acct,
    vals: buildSeries(acct),
  }));

  const visibleSeries = series.filter(s => visibleAccounts.includes(s.id));
  const allVals = visibleSeries.flatMap(s => s.vals);
  const maxV = Math.max(...allVals, BREACH_THRESHOLD + 1000);
  const minV = Math.min(...allVals, 0);
  const range = maxV - minV || 1;

  const toX = (i) => (i / 32) * width;
  const toY = (v) => height - 20 - ((v - minV) / range) * (height - 36);

  const makePath = (vals) => vals.map((v, i) => `${toX(i)},${toY(v)}`).join(' L ');
  const makeFill = (vals) => `M ${makePath(vals)} L ${toX(vals.length-1)},${height} L ${toX(0)},${height} Z`;

  const getColor = (colorKey) => ({
    accent: t.accent, success: t.success, danger: t.danger, warning: t.warning,
  }[colorKey] || t.accent);

  // Breach points for checking
  const checkingSeries = series.find(s => s.id === 'checking');
  const breachDays = checkingSeries
    ? checkingSeries.vals.map((v, i) => ({ d: i, v, breach: v < BREACH_THRESHOLD })).filter(p => p.breach)
    : [];

  // Month labels
  const monthMarkers = [1, 8, 15, 22, 29];

  const handleMouseMove = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const day = Math.round((x / rect.width) * 32);
    setHoveredDay(Math.max(0, Math.min(32, day)));
  };

  return (
    <div style={{ background: t.bgPrimary, fontFamily: "'Geist', sans-serif", height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '20px 28px 0', flexShrink: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: t.fgPrimary }}>Financial Landscape</div>
            <div style={{ fontSize: 12, color: t.fgMuted, marginTop: 2 }}>May 2026 · 30-day balance projection</div>
          </div>
          {/* Account toggles */}
          <div style={{ display: 'flex', gap: 6 }}>
            {ACCOUNT_SERIES.map(acct => {
              const on = visibleAccounts.includes(acct.id);
              const color = getColor(acct.color);
              return (
                <button key={acct.id}
                  onClick={() => setVisibleAccounts(v => on ? v.filter(x => x !== acct.id) : [...v, acct.id])}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 6, padding: '5px 12px',
                    borderRadius: 20, border: `1px solid ${on ? color : t.border}`,
                    background: on ? `${color}15` : 'transparent',
                    color: on ? color : t.fgMuted,
                    cursor: 'pointer', fontSize: 12, fontWeight: on ? 500 : 400,
                    fontFamily: "'Geist', sans-serif",
                    transition: 'all 0.15s',
                  }}>
                  <div style={{ width: 6, height: 6, borderRadius: '50%', background: on ? color : t.fgMuted }} />
                  {acct.label}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* SVG terrain */}
      <div style={{ flex: 1, padding: '0 28px 16px', position: 'relative' }}>
        <svg
          ref={svgRef}
          width="100%" height="100%"
          viewBox={`0 0 ${width} ${height}`}
          preserveAspectRatio="none"
          onMouseMove={handleMouseMove}
          onMouseLeave={() => setHoveredDay(null)}
          style={{ display: 'block', cursor: 'crosshair' }}
        >
          <defs>
            {ACCOUNT_SERIES.map(acct => {
              const color = getColor(acct.color);
              return (
                <linearGradient key={acct.id} id={`grad-${acct.id}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.22" />
                  <stop offset="100%" stopColor={color} stopOpacity="0.01" />
                </linearGradient>
              );
            })}
            {/* Clip for animation */}
            <clipPath id="animClip">
              <rect x="0" y="0" width={animated ? width : 0} height={height}
                style={{ transition: animated ? 'width 1.8s cubic-bezier(0.4,0,0.2,1)' : 'none' }} />
            </clipPath>
          </defs>

          {/* Y-axis grid lines */}
          {[0, 0.25, 0.5, 0.75, 1].map((frac, i) => {
            const v = minV + frac * range;
            const y = toY(v);
            return (
              <g key={i}>
                <line x1={0} y1={y} x2={width} y2={y} stroke={t.border} strokeWidth={1} />
                <text x={4} y={y - 3} fill={t.fgMuted} fontSize={9} fontFamily="'Geist Mono', monospace">
                  {v >= 0 ? `$${Math.round(v/1000)}k` : `-$${Math.round(Math.abs(v)/1000)}k`}
                </text>
              </g>
            );
          })}

          {/* Breach threshold line */}
          {visibleAccounts.includes('checking') && (
            <g>
              <line x1={0} y1={toY(BREACH_THRESHOLD)} x2={width} y2={toY(BREACH_THRESHOLD)}
                stroke={t.warning} strokeWidth={1} strokeDasharray="6,4" />
              <text x={width - 4} y={toY(BREACH_THRESHOLD) - 4} fill={t.warning} fontSize={9}
                fontFamily="'Geist Mono', monospace" textAnchor="end">
                min ${BREACH_THRESHOLD.toLocaleString()}
              </text>
            </g>
          )}

          {/* Today line */}
          <line x1={toX(4)} y1={0} x2={toX(4)} y2={height} stroke={t.accent} strokeWidth={1} strokeDasharray="4,3" />
          <text x={toX(4) + 4} y={12} fill={t.accent} fontSize={9} fontFamily="'Geist Mono', monospace">today</text>

          {/* Month day labels */}
          {monthMarkers.map(d => (
            <text key={d} x={toX(d)} y={height - 4} fill={t.fgMuted} fontSize={9}
              fontFamily="'Geist Mono', monospace" textAnchor="middle">{d}</text>
          ))}

          {/* Account series — fills then lines */}
          <g clipPath="url(#animClip)">
            {visibleSeries.map(acct => {
              const color = getColor(acct.color);
              return (
                <g key={acct.id}>
                  <path d={makeFill(acct.vals)} fill={`url(#grad-${acct.id})`} />
                  <path d={`M ${makePath(acct.vals)}`} fill="none" stroke={color}
                    strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
                </g>
              );
            })}

            {/* Breach zones — red fill below threshold */}
            {visibleAccounts.includes('checking') && checkingSeries && (() => {
              const segs = [];
              let inBreach = false, segStart = null;
              checkingSeries.vals.forEach((v, i) => {
                if (v < BREACH_THRESHOLD && !inBreach) { inBreach = true; segStart = i; }
                if ((v >= BREACH_THRESHOLD || i === checkingSeries.vals.length - 1) && inBreach) {
                  inBreach = false;
                  const end = i;
                  const pts = checkingSeries.vals.slice(segStart, end + 1).map((vv, ii) =>
                    `${toX(segStart + ii)},${toY(vv)}`).join(' L ');
                  segs.push(
                    <path key={segStart} d={`M ${pts} L ${toX(end)},${toY(BREACH_THRESHOLD)} L ${toX(segStart)},${toY(BREACH_THRESHOLD)} Z`}
                      fill={t.danger} fillOpacity={0.15} />
                  );
                }
              });
              return segs;
            })()}

            {/* Event dots */}
            {visibleSeries.flatMap(acct => acct.events.map((ev, i) => {
              const color = getColor(acct.color);
              const v = acct.vals[ev.d];
              return (
                <circle key={`${acct.id}-${i}`} cx={toX(ev.d)} cy={toY(v)} r={3.5}
                  fill={color} stroke={t.bgPrimary} strokeWidth={1.5} />
              );
            }))}
          </g>

          {/* Hover crosshair */}
          {hoveredDay !== null && (
            <g>
              <line x1={toX(hoveredDay)} y1={0} x2={toX(hoveredDay)} y2={height - 20}
                stroke={t.fgMuted} strokeWidth={1} strokeDasharray="3,2" />
              {visibleSeries.map(acct => {
                const color = getColor(acct.color);
                const v = acct.vals[Math.min(hoveredDay, acct.vals.length - 1)];
                return (
                  <g key={acct.id}>
                    <circle cx={toX(hoveredDay)} cy={toY(v)} r={4}
                      fill={color} stroke={t.bgPrimary} strokeWidth={2} />
                    <rect x={toX(hoveredDay) + 8} y={toY(v) - 11} width={72} height={16} rx={4}
                      fill={t.bgElevated} stroke={t.border} />
                    <text x={toX(hoveredDay) + 12} y={toY(v) + 1} fill={color} fontSize={10}
                      fontFamily="'Geist Mono', monospace" fontWeight="600">
                      {fmt(v, privacy)}
                    </text>
                  </g>
                );
              })}
            </g>
          )}
        </svg>

        {/* Breach alert banner */}
        {visibleAccounts.includes('checking') && breachDays.length > 0 && (
          <div style={{
            position: 'absolute', bottom: 32, left: 28,
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '8px 14px', borderRadius: 8,
            background: `${t.warning}18`, border: `1px solid ${t.warning}50`,
          }}>
            <span style={{ color: t.warning, fontSize: 13 }}>⚠</span>
            <span style={{ fontSize: 12, color: t.fgPrimary }}>
              Checking drops below <span style={{ fontFamily: "'Geist Mono', monospace", color: t.warning }}>${BREACH_THRESHOLD.toLocaleString()}</span> around May {breachDays[0]?.d || '?'} — consider transferring from savings
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

function TerrainScreen({ t, privacy }) {

    <div style={{ display: 'flex', height: '100%', background: t.bgPrimary, fontFamily: "'Geist', sans-serif" }}>

      <div style={{ flex: 1, overflow: 'hidden' }}>

}

  const resolve = (id, action) => {
    setResolved(r => ({ ...r, [id]: action }));

    <div style={{ display: 'flex', height: '100%', background: t.bgPrimary, fontFamily: "'Geist', sans-serif" }}>

                  </div>

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 14, fontWeight: 600, color: t.fgPrimary }}>{item.title}</span>

                  )}

                {/* Expanded detail */}
                {isExpanded && (
                  <div style={{ borderTop: `1px solid ${t.border}`, padding: '16px 18px', display: 'flex', flexDirection: 'column', gap: 14 }}>
                    <div style={{ fontSize: 13, color: t.fgSecondary, lineHeight: 1.5 }}>{item.detail}</div>

                    {/* Transaction pair */}
                    <div style={{ display: 'flex', gap: 10 }}>
                      {[item.txA, item.txB].filter(Boolean).map((tx, i) => (

                          <div key={i} style={{ flex: 1 }}>

                              onClick={() => resolve(item.id, opt.action)}

// MOBILE CALENDAR — slide-up sheet with terrain + event states
// ══════════════════════════════════════════════════════════════════════════════

function MobileCalendarSheet({ t, privacy, onClose }) {
  const [selectedDay, setSelectedDay] = React.useState(4);
  const [paidEvents, setPaidEvents] = React.useState({ r1: true });
  const DOW = ['S','M','T','W','T','F','S'];

  const runningBalance = (() => {
    let bal = 6420;
    const out = [bal];
    RECURRING_EVENTS.forEach((_, idx) => {
      for (let d = 1; d <= 31; d++) {
        // This loop builds day-by-day
      }
    });
    // simpler approach
    let b = 6420;
    const vals = [b];
    for (let d = 1; d <= 31; d++) {
      RECURRING_EVENTS.filter(e => e.d === d).forEach(e => { b += e.amount; });
      vals.push(Math.max(0, b));
    }
    return vals;
  })();

  const W = 340, H = 52;
  const maxBal = Math.max(...runningBalance);
  const minBal = Math.min(...runningBalance);
  const rng = maxBal - minBal || 1;
  const pts = runningBalance.map((b, i) => {
    const x = (i / (runningBalance.length - 1)) * W;
    const y = H - ((b - minBal) / rng) * (H - 8) - 4;
    return `${x},${y}`;
  });
  const terrainPath = `M ${pts.join(' L ')}`;
  const fillPath = `${terrainPath} L ${W},${H} L 0,${H} Z`;

  const dayGrid = [];
  for (let i = 0; i < 5; i++) dayGrid.push(null);
  for (let d = 1; d <= 31; d++) dayGrid.push(d);
  const weeks = [];
  for (let i = 0; i < dayGrid.length; i += 7) weeks.push(dayGrid.slice(i, i + 7));

  const dayEvents = RECURRING_EVENTS.filter(e => e.d === selectedDay);
  const dayTxs = SAMPLE.recentTx.filter(tx =>
    (selectedDay === 4 && tx.date === 'Today') || (selectedDay === 1 && tx.date === 'May 1')
  );

  return (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0,
      height: '88%',
      background: t.bgElevated,
      borderRadius: '16px 16px 0 0',
      boxShadow: '0 -4px 40px rgba(0,0,0,0.2)',
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
      zIndex: 50,
    }}>
      {/* Drag handle */}
      <div style={{ display: 'flex', justifyContent: 'center', padding: '10px 0 2px' }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: t.border }} />
      </div>

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 20px 12px' }}>
        <div style={{ fontSize: 15, fontWeight: 700, color: t.fgPrimary }}>Calendar · May 2026</div>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: t.fgMuted, fontSize: 20, cursor: 'pointer', lineHeight: 1 }}>✕</button>
      </div>

      {/* Terrain strip */}
      <div style={{ margin: '0 16px 10px', background: t.bgSecondary, borderRadius: 10, border: `1px solid ${t.border}`, padding: '8px 12px 4px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
          <span style={{ fontSize: 10, color: t.fgMuted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Checking · May</span>
          <span style={{ fontSize: 11, fontFamily: "'Geist Mono', monospace", color: t.fgSecondary }}>{fmt(runningBalance[selectedDay], privacy)}</span>
        </div>
        <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
          <defs>
            <linearGradient id="mGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={t.accent} stopOpacity="0.2" />
              <stop offset="100%" stopColor={t.accent} stopOpacity="0.01" />
            </linearGradient>
          </defs>
          <path d={fillPath} fill="url(#mGrad)" />
          <path d={`M ${pts.slice(0, 5).join(' L ')}`} fill="none" stroke={t.accent} strokeWidth={2} strokeLinecap="round" />
          <path d={`M ${pts.slice(4).join(' L ')}`} fill="none" stroke={t.accent} strokeWidth={1.5} strokeDasharray="4,3" opacity={0.6} />
          {/* Selected day marker */}
          <line x1={(selectedDay / (runningBalance.length - 1)) * W} y1={0} x2={(selectedDay / (runningBalance.length - 1)) * W} y2={H} stroke={t.accent} strokeWidth={1} strokeDasharray="3,2" />
          {/* Event dots */}
          {RECURRING_EVENTS.map(ev => {
            const x = (ev.d / (runningBalance.length - 1)) * W;
            const y = H - ((runningBalance[ev.d] - minBal) / rng) * (H - 8) - 4;
            const isPaid = paidEvents[ev.id] || ev.status === 'paid';
            const isLate = ev.status === 'late';
            return <circle key={ev.id} cx={x} cy={y} r={3} fill={isPaid ? t.success : isLate ? t.danger : t.fgMuted} stroke={t.bgElevated} strokeWidth={1} />;
          })}
        </svg>
      </div>

      {/* Mini calendar */}
      <div style={{ padding: '0 16px 6px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 3, marginBottom: 3 }}>
          {DOW.map((d, i) => <div key={i} style={{ fontSize: 9, color: t.fgMuted, textAlign: 'center', fontWeight: 600 }}>{d}</div>)}
        </div>
        {weeks.map((week, wi) => (
          <div key={wi} style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 3, marginBottom: 3 }}>
            {week.map((day, di) => {
              if (!day) return <div key={di} />;
              const isToday = day === 4;
              const isSel = day === selectedDay;
              const hasEv = RECURRING_EVENTS.some(e => e.d === day);
              const hasLate = RECURRING_EVENTS.some(e => e.d === day && e.status === 'late');
              const hasInc = RECURRING_EVENTS.some(e => e.d === day && e.type === 'income');
              return (
                <div key={di} onClick={() => setSelectedDay(day)} style={{
                  height: 36, borderRadius: 7, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
                  cursor: 'pointer',
                  background: isSel ? t.accent : isToday ? `${t.accent}14` : 'transparent',
                  border: isToday && !isSel ? `1px solid ${t.accent}40` : '1px solid transparent',
                }}>
                  <span style={{ fontSize: 12, fontWeight: isToday ? 700 : 400, color: isSel ? t.accentFg : isToday ? t.accent : t.fgPrimary, lineHeight: 1 }}>{day}</span>
                  {hasEv && (
                    <div style={{ display: 'flex', gap: 2 }}>
                      {hasInc && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.7)' : t.success }} />}
                      {hasLate && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.7)' : t.danger }} />}
                      {!hasInc && !hasLate && <div style={{ width: 4, height: 4, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.5)' : t.fgMuted, opacity: 0.7 }} />}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div style={{ borderTop: `1px solid ${t.border}` }} />

      {/* Day events — scrollable */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: t.fgPrimary, marginBottom: 10 }}>
          May {selectedDay}{selectedDay === 4 ? ' · Today' : selectedDay > 4 ? ' · Upcoming' : ''}
        </div>

        {dayEvents.map(ev => {
          const isPaid = paidEvents[ev.id] || ev.status === 'paid';
          const isLate = ev.status === 'late';
          const isIncome = ev.type === 'income';
          const dotColor = isPaid ? t.success : isLate ? t.danger : isIncome ? t.success : t.fgMuted;
          const bg = isPaid ? `${t.success}08` : isLate ? `${t.danger}10` : t.bgSecondary;
          return (
            <div key={ev.id} style={{ background: bg, borderRadius: 12, padding: '12px 14px', marginBottom: 8, border: `1px solid ${isPaid ? t.success+'25' : isLate ? t.danger+'40' : t.border}` }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: dotColor, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500, color: t.fgPrimary }}>{ev.label}</div>
                  <div style={{ fontSize: 11, color: t.fgMuted }}>{ev.account}</div>
                </div>
                <div style={{ fontSize: 15, fontWeight: 600, fontFamily: "'Geist Mono', monospace", color: isIncome ? t.success : t.fgPrimary }}>
                  {isIncome ? '+' : ''}{fmt(ev.amount, privacy)}
                </div>
              </div>
              {!isPaid && (
                <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                  {isLate && <span style={{ fontSize: 11, color: t.danger, background: `${t.danger}12`, padding: '3px 8px', borderRadius: 4, fontWeight: 500 }}>⚠ {ev.daysLate}d late</span>}
                  <button onClick={() => setPaidEvents(p => ({ ...p, [ev.id]: true }))}
                    style={{ marginLeft: 'auto', fontSize: 12, padding: '6px 14px', borderRadius: 8, border: `1px solid ${t.success}`, background: `${t.success}14`, color: t.success, cursor: 'pointer', fontWeight: 500, fontFamily: "'Geist', sans-serif" }}>
                    ✓ Mark paid
                  </button>
                  <button style={{ fontSize: 12, padding: '6px 12px', borderRadius: 8, border: `1px solid ${t.border}`, background: 'none', color: t.fgMuted, cursor: 'pointer', fontFamily: "'Geist', sans-serif" }}>Skip</button>
                </div>
              )}
              {isPaid && <div style={{ fontSize: 11, color: t.success, marginTop: 6 }}>✓ Matched to transaction</div>}
            </div>
          );
        })}

        {dayTxs.map((tx, i) => <TxRow key={i} tx={tx} t={t} privacy={privacy} />)}

        {dayEvents.length === 0 && dayTxs.length === 0 && (
          <div style={{ textAlign: 'center', padding: '32px 0', color: t.fgMuted, fontSize: 13 }}>
            {selectedDay > 4 ? 'No expected events' : 'No activity'}
          </div>
        )}
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "themeMode": "dark",

  "variation": "B"
}/*EDITMODE-END*/;

  const tLight = THEMES.light;
  const tDark = THEMES.dark;

    if (tweaks.themeMode === 'light') return tLight;
    if (tweaks.themeMode === 'dark') return tDark;
    return side === 'left' ? tLight : tDark; // both
  };

  const showBoth = tweaks.themeMode === 'both';
  const privacy = tweaks.privacyMode;
