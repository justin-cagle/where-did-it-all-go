# Compose profiles:
#   (default)       — postgres, redis, app, worker-fast, worker-slow
#   bundled-proxy   — adds Caddy reverse proxy (TLS termination, security headers)
#   ollama          — adds local Ollama LLM service for AI insights

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wdiag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-wdiag}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wdiag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    # Added to avoid false positives in WUD for updates
    labels:
      - wud.watch=false

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    # Added to avoid false positives in WUD for updates
    labels:
      - wud.watch=false

  app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/wdiag-backend:${IMAGE_TAG:-latest}
    build:
      context: ./apps/backend
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wdiag}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wdiag}
      REDIS_URL: redis://redis:6379/0
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SQLALCHEMY_WARN_20: ${SQLALCHEMY_WARN_20:-0}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
    ports:
      - 8111:8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker-fast:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/wdiag-backend:${IMAGE_TAG:-latest}
    build:
      context: ./apps/backend
      target: production
    restart: unless-stopped
    command: ["uv", "run", "arq", "app.worker.fast.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wdiag}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wdiag}
      REDIS_URL: redis://redis:6379/0
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  worker-slow:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/wdiag-backend:${IMAGE_TAG:-latest}
    build:
      context: ./apps/backend
      target: production
    restart: unless-stopped
    command: ["uv", "run", "arq", "app.worker.slow.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wdiag}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wdiag}
      REDIS_URL: redis://redis:6379/0
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/wdiag-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./apps/frontend
      target: serve
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Bundled reverse proxy. Active when COMPOSE_PROFILES includes 'bundled-proxy'.
  # To use your own proxy, remove 'bundled-proxy' from COMPOSE_PROFILES and expose
  # app port 8000 directly (or use a docker-compose.override.yml).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["bundled-proxy"]
    ports:
      - "85:80"
      - "447:443"
      - "447:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:?DOMAIN_NAME is required when using bundled-proxy}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    labels:
      - wud.watch=false

  # Optional local LLM. Active when COMPOSE_PROFILES includes 'ollama'.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  ollama_data:
